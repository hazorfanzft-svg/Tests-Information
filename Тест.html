<!DOCTYPE html>
<html lang="tg">
<head>
<meta charset="UTF-8">
<title>Google Forms Style Test</title>
<style>
body{
    margin:0;
    font-family: Arial;
    background:#f1f5f9;
}
.container{
    max-width:800px;
    margin:auto;
    padding:20px;
}
.card{
    background:white;
    padding:20px;
    border-radius:12px;
    margin-top:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
h2{color:#111827;}
input[type="text"]{
    width:100%;
    padding:12px;
    border:1px solid #cbd5e1;
    border-radius:8px;
}
.option{
    display:block;
    padding:10px;
    margin:8px 0;
    border:1px solid #e2e8f0;
    border-radius:8px;
    cursor:pointer;
}
.option:hover{
    background:#f8fafc;
}
button{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
}
.timer{
    font-weight:bold;
    color:#dc2626;
}
.hidden{display:none;}
</style>
</head>
<body>

<div class="container">

<!-- REG -->
<div id="reg" class="card">
<h2>📋 Регистратсия</h2>
<input id="name" placeholder="Ному насаб">
<br><br>
<button onclick="start()">Оғоз</button>
<p id="err" style="color:red"></p>
</div>

<!-- TEST -->
<div id="test" class="card hidden">
<h2>🧠 Тест</h2>
<p class="timer">⏱ Вақт: <span id="time">40:00</span></p>
<div id="quiz"></div>
<br>
<button onclick="finish()">Анҷом</button>
</div>

<!-- RESULT -->
<div id="result" class="card hidden">
<h2>📊 Натиҷа</h2>
<p id="score"></p>
<button onclick="makeCert()">🏆 Сертификат PNG</button>
</div>

</div>

<script>

let user="";
let time=2400;
let int;

let quiz=[
{q:"HTML чист?",a:"Забони веб",b:"Бозӣ",c:"OS",d:"Virus",correct:"a"},
{q:"CSS барои чӣ?",a:"Дизайн",b:"Logic",c:"Server",d:"DB",correct:"a"},
{q:"JS чист?",a:"Programming",b:"Hardware",c:"Food",d:"Car",correct:"a"},
{q:"CPU чист?",a:"Processor",b:"Screen",c:"Mouse",d:"Disk",correct:"a"},
{q:"RAM чист?",a:"Temporary memory",b:"Permanent",c:"Internet",d:"File",correct:"a"}
];

while(quiz.length<30){
quiz.push({
q:"Савол "+(quiz.length+1),
a:"A",b:"B",c:"C",d:"D",
correct:"a"
});
}

function start(){
let n=document.getElementById("name").value;
if(!n){
document.getElementById("err").innerText="Номро навис!";
return;
}
user=n;

document.getElementById("reg").classList.add("hidden");
document.getElementById("test").classList.remove("hidden");

let html="";
quiz.forEach((q,i)=>{
html+=`
<div class="card">
<p><b>${i+1}. ${q.q}</b></p>
<label class="option"><input type="radio" name="q${i}" value="a"> ${q.a}</label>
<label class="option"><input type="radio" name="q${i}" value="b"> ${q.b}</label>
<label class="option"><input type="radio" name="q${i}" value="c"> ${q.c}</label>
<label class="option"><input type="radio" name="q${i}" value="d"> ${q.d}</label>
</div>`;
});

document.getElementById("quiz").innerHTML=html;

int=setInterval(timer,1000);
}

function timer(){
time--;
let m=Math.floor(time/60);
let s=time%60;
document.getElementById("time").innerText=
m+":"+(s<10?"0":"")+s;

if(time<=0) finish();
}

function finish(){
clearInterval(int);

let score=0;
for(let i=0;i<quiz.length;i++){
let a=document.querySelector(`input[name="q${i}"]:checked`);
if(a && a.value===quiz[i].correct) score++;
}

document.getElementById("test").classList.add("hidden");
document.getElementById("result").classList.remove("hidden");

document.getElementById("score").innerText=
`Натиҷа: ${score}/30`;
}

function makeCert(){

let scoreText=document.getElementById("score").innerText;

let canvas=document.createElement("canvas");
canvas.width=1000;
canvas.height=700;
let ctx=canvas.getContext("2d");

// background
ctx.fillStyle="white";
ctx.fillRect(0,0,canvas.width,canvas.height);

// border
ctx.strokeStyle="#2563eb";
ctx.lineWidth=10;
ctx.strokeRect(20,20,960,660);

// title
ctx.fillStyle="black";
ctx.font="40px Arial";
ctx.fillText("🏆 CERTIFICATE",300,120);

// name
ctx.font="30px Arial";
ctx.fillText("Student: "+user,250,250);

// score
ctx.fillText(scoreText,250,320);

// author
ctx.fillText("Author: Toktobaev Shahrom",250,500);

// download
let link=document.createElement("a");
link.download="certificate.png";
link.href=canvas.toDataURL("image/png");
link.click();
}

</script>

</body>
</html>
